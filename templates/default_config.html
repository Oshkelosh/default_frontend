{% extends "base.html" %}

{% block title %}Default Storefront{% endblock %}

{% block content %}
<h1>Default Storefront</h1>

<div class="card">
    <p style="color:var(--clr-text-muted);margin-bottom:16px;">
        Site-wide branding (name, logo, colors) is configured under
        <a href="/admin/settings">Site Settings</a>.
    </p>

    <form method="post" action="/admin/frontends/default/save" class="form">
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_enabled" {% if addon and addon.is_enabled %}checked{% endif %} />
                Enable this storefront
            </label>
        </div>

        <div class="form-group">
            <label for="layout">Product layout</label>
            <select id="layout" name="layout">
                <option value="grid" {% if config.get('layout') == 'grid' %}selected{% endif %}>Grid</option>
                <option value="list" {% if config.get('layout') == 'list' %}selected{% endif %}>List</option>
            </select>
        </div>

        <div class="form-group">
            <label for="products_per_page">Products per page</label>
            <input type="number" id="products_per_page" name="products_per_page"
                   value="{{ config.get('products_per_page', 12) }}" min="1" max="100" />
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox" name="show_category_nav"
                       {% if config.get('show_category_nav', True) %}checked{% endif %} />
                Show category navigation
            </label>
        </div>

        <button type="submit" class="btn btn--primary">Save</button>
        <a href="/admin/frontends" class="btn btn--secondary">Back to Frontends</a>
    </form>
</div>
{% endblock %}
